# GPU overlay for the bundled Ollama model server. up.sh adds this file
# (docker compose -f compose.yml -f compose.gpu.yml) only when an NVIDIA GPU
# is detected, so the base compose.yml stays CPU-portable (Mac/Windows/Linux).
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
