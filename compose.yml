name: openclaw-governed

# ─────────────────────────────────────────────────────────────────────────────
# OpenClaw (an AI agent) governed by Agent Control, with every run observed:
#   governance decisions  -> Splunk   (allow / BLOCK, per tool call)
#   LLM turns             -> Galileo  (scorable prompt/response spans)
# All ports bind to 127.0.0.1 only. Reach them over SSH tunnels or a reverse proxy.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # --- Agent Control: the governor (stores policy + every decision) -----------
  postgres:
    image: postgres:16.14-alpine
    environment:
      POSTGRES_DB: agent_control
      POSTGRES_USER: agent_control
      POSTGRES_PASSWORD: "${AC_PG_PASSWORD}"
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_control -d agent_control"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  server:
    build:
      context: "https://github.com/agentcontrol/agent-control.git#v8.2.0"
      dockerfile: server/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["127.0.0.1:${AC_PORT:-8181}:8000"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      AGENT_CONTROL_DB_URL: "postgresql+psycopg://agent_control:${AC_PG_PASSWORD}@postgres:5432/agent_control"
      AGENT_CONTROL_HOST: "0.0.0.0"
      AGENT_CONTROL_PORT: "8000"
      AGENT_CONTROL_API_KEY_ENABLED: "true"
      AGENT_CONTROL_API_KEYS: "${AC_API_KEY}"
      AGENT_CONTROL_ADMIN_API_KEYS: "${AC_ADMIN_KEY}"
      AGENT_CONTROL_SESSION_SECRET: "${AC_SESSION_SECRET}"
    restart: unless-stopped

  # --- OpenClaw: the governed agent (gateway + Galileo forwarder baked in) -----
  openclaw:
    build:
      context: ./openclaw
      args:
        OPENCLAW_REF: "${OPENCLAW_REF:-v2026.3.8}"
        PLUGIN_REF: "${PLUGIN_REF:-v1.8.2}"
    depends_on:
      server: { condition: service_started }
    ports: ["127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      # LLM (any OpenAI-compatible endpoint: vLLM, Ollama, OpenAI, ...)
      LLM_BASE_URL: "${LLM_BASE_URL:-http://host.docker.internal:8000/v1}"
      LLM_MODEL: "${LLM_MODEL:-openai/gpt-oss-120b}"
      LLM_API_KEY: "${LLM_API_KEY:-unused}"
      # Governor
      AC_SERVER_URL: "http://server:8000"
      AC_PLUGIN_API_KEY: "${AC_ADMIN_KEY}"
      GOVERNANCE_FAIL_CLOSED: "${GOVERNANCE_FAIL_CLOSED:-true}"
      OPENCLAW_GATEWAY_PORT: "18789"
      GATEWAY_TOKEN: "${GATEWAY_TOKEN}"
      # Galileo (optional, leave GALILEO_API_KEY blank to disable)
      GALILEO_API_KEY: "${GALILEO_API_KEY:-}"
      GALILEO_PROJECT: "${GALILEO_PROJECT:-OpenClaw_Galileo}"
      GALILEO_LOG_STREAM: "${GALILEO_LOG_STREAM:-Stream_1}"
      GALILEO_OTEL_ENDPOINT: "${GALILEO_OTEL_ENDPOINT:-https://api.galileo.ai/otel/traces}"
    restart: unless-stopped

  # --- Splunk (optional: `--profile splunk`) ----------------------------------
  splunk:
    image: splunk/splunk:9.4.13
    profiles: ["splunk"]
    environment:
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_PASSWORD: "${SPLUNK_PASSWORD:?set SPLUNK_PASSWORD in .env}"
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN}"
    ports: ["127.0.0.1:${SPLUNK_PORT:-8090}:8000"]
    volumes: ["splunkvar:/opt/splunk/var", "splunketc:/opt/splunk/etc"]
    restart: unless-stopped

  splunk-forwarder:
    build: { context: ./forwarders, dockerfile: Dockerfile.splunk }
    profiles: ["splunk"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PG_HOST: "postgres"
      PG_PASSWORD: "${AC_PG_PASSWORD}"
      SPLUNK_HEC_URL: "${SPLUNK_HEC_URL:-http://splunk:8088/services/collector/event}"
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN}"
      SPLUNK_INDEX: "${SPLUNK_INDEX:-main}"
      STATE_FILE: "/state/.fwd_last_ts"
    volumes: ["fwdstate:/state"]
    restart: unless-stopped

volumes:
  pgdata: {}
  splunkvar: {}
  splunketc: {}
  fwdstate: {}
