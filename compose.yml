name: galileo-governed

# ─────────────────────────────────────────────────────────────────────────────
# OpenClaw (an AI agent) governed by Agent Control, with every run observed:
#   governance decisions  -> Splunk   (allow / BLOCK, per tool call)
#   LLM turns             -> Galileo  (scorable prompt/response spans)
# All ports bind to 127.0.0.1 only. Reach them over SSH tunnels or a reverse proxy.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # --- Agent Control: the governor (stores policy + every decision) -----------
  postgres:
    image: postgres:16.14-alpine
    environment:
      POSTGRES_DB: agent_control
      POSTGRES_USER: agent_control
      POSTGRES_PASSWORD: "${AC_PG_PASSWORD}"
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_control -d agent_control"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  server:
    # Stock Agent Control + our DefenseClaw evaluator overlay (ac-server/Dockerfile).
    # up.sh builds the base image (openclaw-ac-base) from the upstream tag once.
    build:
      context: .
      dockerfile: ac-server/Dockerfile
      args:
        BASE_IMAGE: "${AC_BASE_IMAGE:-openclaw-ac-base:8.2.0}"
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["127.0.0.1:${AC_PORT:-8181}:8000"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      AGENT_CONTROL_DB_URL: "postgresql+psycopg://agent_control:${AC_PG_PASSWORD}@postgres:5432/agent_control"
      AGENT_CONTROL_HOST: "0.0.0.0"
      AGENT_CONTROL_PORT: "8000"
      AGENT_CONTROL_API_KEY_ENABLED: "true"
      AGENT_CONTROL_API_KEYS: "${AC_API_KEY}"
      AGENT_CONTROL_ADMIN_API_KEYS: "${AC_ADMIN_KEY}"
      AGENT_CONTROL_SESSION_SECRET: "${AC_SESSION_SECRET}"
      # DefenseClaw detector (optional): a rule can use the `defenseclaw` evaluator to
      # send tool calls / prompts to your local DefenseClaw gateway for a verdict. Blank
      # token = the detector is present but unused. The evaluator reads DEFENSECLAW_TOKEN.
      DEFENSECLAW_TOKEN: "${DEFENSECLAW_TOKEN:-}"
      DEFENSECLAW_BASE_URL: "${DEFENSECLAW_BASE_URL:-http://host.docker.internal:18970}"
    restart: unless-stopped

  # --- OpenClaw: the governed agent (gateway + Galileo forwarder baked in) -----
  openclaw:
    build:
      context: .
      dockerfile: openclaw/Dockerfile
      args:
        OPENCLAW_REF: "${OPENCLAW_REF:-v2026.3.8}"
        PLUGIN_REF: "${PLUGIN_REF:-v1.8.2}"
    depends_on:
      server: { condition: service_started }
      llm-proxy: { condition: service_started }
    ports: ["127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      # LLM: any OpenAI-compatible endpoint (Groq, OpenAI, NVIDIA, vLLM, ...), set in setup
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.groq.com/openai/v1}"
      LLM_MODEL: "${LLM_MODEL:-llama-3.3-70b-versatile}"
      LLM_API_KEY: "${LLM_API_KEY:-unused}"
      # Governor. The agent side holds only the REGULAR key (evaluation + initAgent
      # + audit events); the ADMIN key stays in ac-setup, so a compromised agent
      # cannot rewrite or detach its own controls.
      AC_SERVER_URL: "http://server:8000"
      AC_PLUGIN_API_KEY: "${AC_API_KEY}"
      GOVERNANCE_FAIL_CLOSED: "${GOVERNANCE_FAIL_CLOSED:-true}"
      GOVERNANCE_ENABLED: "${GOVERNANCE_ENABLED:-true}"
      # LLM-layer governance: route reasoning through the proxy (Agent Control LLM surface)
      LLM_GOVERNANCE: "${LLM_GOVERNANCE:-true}"
      LLM_PROXY_URL: "http://llm-proxy:8100/v1"
      OPENCLAW_GATEWAY_PORT: "18789"
      GATEWAY_TOKEN: "${GATEWAY_TOKEN}"
      # Galileo (optional, leave GALILEO_API_KEY blank to disable)
      GALILEO_API_KEY: "${GALILEO_API_KEY:-}"
      GALILEO_PROJECT: "${GALILEO_PROJECT:-OpenClaw_Galileo}"
      GALILEO_LOG_STREAM: "${GALILEO_LOG_STREAM:-Stream_1}"
      GALILEO_OTEL_ENDPOINT: "${GALILEO_OTEL_ENDPOINT:-https://api.galileo.ai/otel/traces}"
      # Splunk HEC (optional): set SPLUNK_HEC_URL to also ship every LLM turn to Splunk.
      SPLUNK_HEC_URL: "${SPLUNK_HEC_URL:-}"
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN:-}"
      SPLUNK_INDEX: "${SPLUNK_INDEX:-main}"
      # Splunk Observability Cloud (optional, independent of HEC): ship LLM turns as
      # traces. Set both to enable. Governance decisions -> metrics via o11y-forwarder.
      SPLUNK_O11Y_REALM: "${SPLUNK_O11Y_REALM:-}"
      SPLUNK_O11Y_TOKEN: "${SPLUNK_O11Y_TOKEN:-}"
      SPLUNK_O11Y_SERVICE: "${SPLUNK_O11Y_SERVICE:-openclaw}"
      # Webex governed tools (BYO-per-user creds live in the persisted settings file)
      WEBEX_ENABLED: "${WEBEX_ENABLED:-true}"
      WEBEX_SETTINGS: "/root/.openclaw-webex/webex.json"
      WEBEX_CLIENT_ID: "${WEBEX_CLIENT_ID:-}"
      WEBEX_CLIENT_SECRET: "${WEBEX_CLIENT_SECRET:-}"
      WEBEX_REDIRECT_URI: "${WEBEX_REDIRECT_URI:-}"
      WEBEX_SCOPES: "${WEBEX_SCOPES:-}"
      # Telegram channel (blank = off): drive the governed agent from chat
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_ALLOW: "${TELEGRAM_ALLOW:-}"
    volumes:
      - webexdata:/root/.openclaw-webex
      # Persist device pairing + sessions so the delegate stays paired across restarts
      # (config is re-rendered each boot regardless). Avoids re-priming on every restart.
      - openclawdata:/root/.openclaw
    restart: unless-stopped

  # --- llm-proxy: LLM-layer governance (OpenClaw <-> model hop) ----------------
  llm-proxy:
    build: { context: ./llm-proxy }
    depends_on:
      server: { condition: service_started }
    extra_hosts: ["host.docker.internal:host-gateway"]
    environment:
      PORT: "8100"
      LLM_UPSTREAM_URL: "${LLM_BASE_URL:-https://api.groq.com/openai/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-unused}"
      AC_SERVER_URL: "http://server:8000"
      AC_API_KEY: "${AC_API_KEY}"
      AGENT_NAME: "openclaw-agent:main"
      LLM_GOVERNANCE: "${LLM_GOVERNANCE:-true}"
      GOVERNANCE_FAIL_CLOSED: "${GOVERNANCE_FAIL_CLOSED:-true}"
      # steer semantics: inject (Agent Control native) or respond (soft-deny)
      STEER_MODE: "${STEER_MODE:-inject}"
      # also govern tool RESULTS at the LLM layer (indirect prompt injection)
      GOVERN_TOOL_RESULTS: "${GOVERN_TOOL_RESULTS:-true}"
    restart: unless-stopped

  # --- ac-setup: one-shot, attaches the demo deny rule to the agent -----------
  # Only acts when GOVERNANCE_ENABLED=true; idempotent; exits after attaching.
  ac-setup:
    build: { context: ./ac-setup }
    depends_on:
      server: { condition: service_started }
      openclaw: { condition: service_started }
    environment:
      AC_URL: "http://server:8000"
      AC_ADMIN_KEY: "${AC_ADMIN_KEY}"
      AGENT_NAME: "openclaw-agent:main"
      FORBIDDEN_TOKEN: "${FORBIDDEN_TOKEN:-FORBIDDEN}"
      GOVERNANCE_ENABLED: "${GOVERNANCE_ENABLED:-true}"
      # Seed the 5 starter controls once, idempotently. Set false to manage everything
      # in the UI. AC_UI_URL is only printed as a hint (the host-mapped Agent Control UI).
      AC_SEED_STARTER: "${AC_SEED_STARTER:-true}"
      AC_UI_URL: "http://127.0.0.1:${AC_PORT:-8181}"
    restart: "no"

  # --- Splunk (optional: `--profile splunk`) ----------------------------------
  splunk:
    image: splunk/splunk:9.4.13
    profiles: ["splunk"]
    environment:
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_PASSWORD: "${SPLUNK_PASSWORD:-changeme-splunk-admin}"
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN}"
    ports: ["127.0.0.1:${SPLUNK_PORT:-8090}:8000"]
    volumes: ["splunkvar:/opt/splunk/var", "splunketc:/opt/splunk/etc"]
    restart: unless-stopped

  splunk-forwarder:
    build: { context: ./forwarders, dockerfile: Dockerfile.splunk }
    # "splunk" = with the bundled Splunk; "splunk-hec" = forwarder only (external Splunk).
    profiles: ["splunk", "splunk-hec"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PG_HOST: "postgres"
      PG_PASSWORD: "${AC_PG_PASSWORD}"
      SPLUNK_HEC_URL: "${SPLUNK_HEC_URL:-http://splunk:8088/services/collector/event}"
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN}"
      SPLUNK_INDEX: "${SPLUNK_INDEX:-main}"
      # true = skip TLS verification toward the HEC (self-signed certs); default verify
      SPLUNK_HEC_INSECURE: "${SPLUNK_HEC_INSECURE:-false}"
      STATE_FILE: "/state/.fwd_last_ts"
    volumes: ["fwdstate:/state"]
    restart: unless-stopped

  # --- Splunk Observability Cloud metrics (optional: `--profile splunk-o11y`) --
  # Ships governance decisions to o11y as SignalFx metrics. Pairs with the in-container
  # o11y LLM-trace forwarder (gated on the same SPLUNK_O11Y_* env) to give o11y both
  # lenses. Fully independent of the Splunk HEC path above; run either, or both.
  o11y-forwarder:
    build: { context: ./forwarders, dockerfile: Dockerfile.o11y }
    profiles: ["splunk-o11y"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PG_HOST: "postgres"
      PG_PASSWORD: "${AC_PG_PASSWORD}"
      SPLUNK_O11Y_REALM: "${SPLUNK_O11Y_REALM:-}"
      SPLUNK_O11Y_TOKEN: "${SPLUNK_O11Y_TOKEN:-}"
      STATE_FILE: "/state/.o11y_last_ts"
    volumes: ["fwdstate:/state"]
    restart: unless-stopped

  # DefenseClaw reachability shim (optional, --profile defenseclaw). The Agent Control
  # server runs in a container and cannot reach a DefenseClaw gateway bound to the host's
  # 127.0.0.1. This host-network forwarder exposes it on DEFENSECLAW_SHIM_PORT so the
  # server reaches it at host.docker.internal:<port>. up.sh turns this on when
  # DEFENSECLAW_TOKEN is set. Advanced: bind your gateway to 0.0.0.0 and skip this.
  defenseclaw-shim:
    image: python:3.12-slim
    profiles: ["defenseclaw"]
    network_mode: host
    volumes: ["./bin/dc-shim.py:/dc-shim.py:ro"]
    command: ["python3", "/dc-shim.py"]
    environment:
      DC_LISTEN: "${DEFENSECLAW_SHIM_PORT:-18971}"
      DC_TARGET: "${DEFENSECLAW_GATEWAY:-127.0.0.1:18970}"
    restart: unless-stopped

volumes:
  webexdata: {}
  openclawdata: {}
  pgdata: {}
  splunkvar: {}
  splunketc: {}
  fwdstate: {}
