<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Governed OpenClaw</title>
<style>
:root{--bg:#0e1216;--panel:#171d24;--panel2:#1c232b;--line:#232b34;--line2:#2c3742;--ink:#dbe3ee;
--hd:#9aa7b8;--mu:#6b7787;--mu2:#586474;--ac:#7f9cf5;--acbg:#1b2440;--g:#2fbf71;--am:#d9a13b;--rd:#ef7a72;
--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14.5px/1.55 var(--sans);-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer}
.app{display:grid;grid-template-columns:210px 1fr;min-height:100vh}
.side{background:var(--panel);border-right:1px solid var(--line);padding:18px 0;position:sticky;top:0;height:100vh}
.brand{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ac);padding:0 18px 16px}
.nav{display:flex;flex-direction:column;gap:1px}
.nav a{display:flex;align-items:center;gap:9px;padding:9px 18px;color:var(--mu);text-decoration:none;font-size:14px;border-left:2px solid transparent}
.nav a:hover{color:var(--ink);background:#151d28}
.nav a.on{color:var(--ink);background:var(--acbg);border-left-color:var(--ac);font-weight:600}
.wrap{padding:30px 34px 80px;max-width:820px}
h1{font-size:22px;margin:0 0 4px;font-weight:640;letter-spacing:-.01em}
.sub{color:var(--mu);margin:0 0 22px;font-size:13.5px;max-width:62ch}
h2{font-size:16px;margin:22px 0 8px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:none}
.dot.up{background:var(--g)}.dot.down{background:var(--mu2)}.dot.warn{background:var(--am)}
/* status */
.stat{display:inline-block;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 16px;margin:0 10px 10px 0;min-width:120px}
.stat b{display:block;font-size:22px;font-variant-numeric:tabular-nums}.stat span{color:var(--mu);font-size:12px}
.svc{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--line);font-size:13.5px}
.svc .nm{flex:1}.svc .st{color:var(--mu);font-size:12px;font-family:var(--mono)}
.gov-line{display:flex;align-items:center;gap:8px;color:var(--mu);font-size:12.5px;margin:0 0 16px}
.btn{background:var(--ac);color:#0e1216;border:0;border-radius:8px;padding:9px 16px;font-weight:640}
.btn:hover{filter:brightness(1.07)}.btn:disabled{opacity:.55;cursor:default}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--ink);font-weight:500}
.btn.sm{padding:6px 11px;font-size:13px}
.foot{display:flex;gap:10px;margin-top:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:12px}
.kv{display:flex;gap:12px;align-items:baseline;padding:5px 0;border-top:1px solid var(--line);font-size:13px}
.kv:first-child{border-top:0}.kv>span:first-child{color:var(--mu);min-width:120px;flex-shrink:0}
.tag{font-size:11.5px;color:var(--mu);border:1px solid var(--line2);border-radius:6px;padding:1px 8px}
.tag.deny{color:var(--rd);border-color:#7a3b38}.tag.steer{color:var(--am);border-color:#7a5f22}.tag.observe{color:var(--mu)}
.ac{color:var(--ac);cursor:pointer;text-decoration:none}
/* Connections cards (redesigned) */
.cx-strip{display:flex;flex-wrap:wrap;align-items:center;gap:8px 16px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 16px;margin-bottom:14px}
.cx-strip .lead{font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu)}
.cx-pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--hd)}
.cx-note{color:var(--mu);font-size:12.5px;flex-basis:100%;margin-top:2px}
.cx-sec{font-family:var(--mono);font-size:12px;letter-spacing:.11em;text-transform:uppercase;color:var(--hd);margin:24px 0 3px}
.cx-intro{color:var(--mu);font-size:13px;margin:0 0 12px;max-width:64ch}
.cx-card{background:var(--panel);border:1px solid var(--line);border-radius:11px;margin-bottom:12px;overflow:hidden;transition:border-color .18s}
.cx-card.open{border-color:var(--line2)}
.cx-head{display:flex;align-items:center;gap:12px;padding:0 15px;height:56px;cursor:pointer;user-select:none}
.cx-nm{font-size:15px;font-weight:600;flex:none}
.cx-what{color:var(--mu);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.cx-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--hd);flex:none}
.cx-body{padding:0 16px;max-height:0;opacity:0;transition:max-height .19s ease,opacity .19s,padding .19s}
.cx-card.open .cx-body{max-height:560px;opacity:1;padding:4px 16px 16px}
.cx-field{margin-bottom:12px}.cx-field label{display:block;font-size:13px;color:var(--hd);margin-bottom:5px}
.cx-inrow{display:flex;gap:8px}
input,select{font:inherit;font-size:13.5px;background:#0f151c;color:var(--ink);border:1px solid var(--line2);border-radius:8px;padding:9px 11px;width:100%}
input:focus,select:focus{outline:none;border-color:var(--ac)}
.cx-help{color:var(--mu);font-size:12px;margin-top:5px;line-height:1.45}
.cx-keep{color:var(--mu);font-size:12px;margin-top:4px}.cx-cardnote{color:var(--mu);font-size:12.5px;margin:0 0 12px}
.cx-eye{background:none;border:0;color:var(--mu);cursor:pointer;padding:0 8px;font-size:13px}
.sw{position:relative;width:38px;height:22px;flex:none}.sw input{opacity:0;width:0;height:0;position:absolute}
.tk{position:absolute;inset:0;background:#2b3540;border-radius:999px;transition:.16s}
.tk:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#c3ccd8;border-radius:50%;transition:.16s}
.sw input:checked+.tk{background:var(--ac)}.sw input:checked+.tk:before{transform:translateX(16px);background:#fff}
/* chat */
.chatlog{background:#0f151c;border:1px solid var(--line);border-radius:10px;padding:12px;height:46vh;overflow:auto;font-size:13.5px}
.msg{margin-bottom:10px}.msg .who{font-family:var(--mono);font-size:11px;color:var(--mu)}
.msg.u .who{color:var(--ac)}.msg pre{margin:3px 0 0;white-space:pre-wrap;font-family:var(--sans)}
.log{background:#0b0f14;border:1px solid var(--line);border-radius:8px;padding:10px;height:38vh;overflow:auto;font-family:var(--mono);font-size:12px;white-space:pre-wrap}
.frame{width:100%;height:calc(100vh - 175px);min-height:420px;border:1px solid var(--line);border-radius:10px;background:#fff}
.mono{font-family:var(--mono);font-size:12px;background:#0f151c;border:1px solid var(--line2);border-radius:4px;padding:1px 5px}
.rail{display:flex;margin:6px 0 20px}
.rail .st{flex:1;text-align:center;position:relative}
.rail .st .d{width:12px;height:12px;border-radius:50%;background:var(--mu2);margin:0 auto 6px;position:relative;z-index:1}
.rail .st.done .d{background:var(--g)}
.rail .st.cur .d{background:var(--ac);box-shadow:0 0 0 4px var(--acbg)}
.rail .st.skip .d{background:transparent;border:2px solid var(--mu2)}
.rail .st b{font-size:11px;color:var(--mu);font-family:var(--mono);font-weight:500}
.rail .st.cur b{color:var(--ink)}
.rail .st:not(:last-child):after{content:"";position:absolute;top:5px;left:50%;width:100%;height:2px;background:var(--line);z-index:0}
.pbar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin:0 0 6px 21px}
.pbar>div{height:100%;background:var(--ac);transition:width .4s}
/* modal */
.backdrop{position:fixed;inset:0;background:rgba(4,7,11,.6);z-index:9;display:flex;align-items:flex-start;justify-content:center;padding:6vh 16px;overflow:auto}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:22px;max-width:560px;width:100%}
.modal h3{margin:0 0 4px}.mbtn{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);opacity:0;transition:.22s;background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:11px 15px;font-size:13px;z-index:30}
.toast.show{opacity:1;transform:translateX(-50%)}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:var(--ac);border-radius:50%;display:inline-block;vertical-align:-2px;animation:sp .6s linear infinite;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style></head><body>
<div class="app">
  <div class="side"><div class="brand">Governed OpenClaw</div>
    <div class="nav" id="nav"></div></div>
  <div class="wrap" id="main"></div>
</div>
<div id="modalroot"></div><div class="toast" id="toast"></div>
<script>
const $=(s,r=document)=>r.querySelector(s);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const S={view:'home',state:null};
const NAV=[['start','Get started'],['home','Home'],['access','Connections'],['governance','Governance'],['control','Agent Control'],['monitoring','Monitoring'],['chat','Chat']];
const CHAT={msgs:[],busy:false};
const SETUP={hello:false,helloBusy:false,helloReply:'',helloMsg:'',rules:false,ready:false,model:'',build:{phase:'idle',lines:[],n:0,err:''},skip:{}};

async function api(path,opts){const r=await fetch(path,opts);return r.json();}
async function loadState(){S.state=await api('/api/state');render();}
function go(v){S.view=v;render();}
function toast(m){const t=$('#toast');t.textContent=m;t.className='toast show';clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',3500);}

function renderNav(){$('#nav').innerHTML=NAV.map(([k,l])=>`<a class="${S.view===k?'on':''}" onclick="go('${k}')">${l}</a>`).join('');}
function render(){renderNav();const st=S.state;if(!st){$('#main').innerHTML='<p class="sub">Loading…</p>';return;}
  if(S.view==='start')$('#main').innerHTML=setupView(st);
  else if(S.view==='home')$('#main').innerHTML=homeView(st);
  else if(S.view==='access')$('#main').innerHTML=accessView(st);
  else if(S.view==='governance')$('#main').innerHTML=governanceView(st);
  else if(S.view==='control')$('#main').innerHTML=controlView(st);
  else if(S.view==='monitoring')$('#main').innerHTML=monitoringView(st);
  else if(S.view==='chat')$('#main').innerHTML=chatView(st);
}

/* ---------- Home ---------- */
function homeView(st){
  const svcs={postgres:'Governance database',server:'Agent Control (the governor)','llm-proxy':'LLM governance proxy',openclaw:'The agent'};
  const up=Object.values(st.stack).every(Boolean);
  const rows=Object.entries(svcs).map(([k,label])=>{const on=st.stack[k];
    return `<div class="svc"><i class="dot ${on?'up':'down'}"></i><span class="nm">${label}</span><span class="st">${on?'running':'stopped'}</span></div>`;}).join('');
  const g=st.gov;
  return `<h1>Home</h1><p class="sub">One governed OpenClaw agent. ${up?'Running now.':'Not running.'} Governance is ${g.enabled?'ON':'OFF'}${g.fail_closed?', fail-closed':''}.</p>
    ${up?statsRow(st):quickStart(st)}
    <h2>The stack</h2><div class="card">${rows}</div>
    ${up?`<div class="foot"><button class="btn ghost" onclick="lifecycle('up','Rebuilding + restarting…')">Rebuild</button></div>`:''}
    <h2>Tear down</h2>
    <div class="foot" style="margin-top:0">
      <button class="btn ghost" onclick="teardown('stop')">Stop</button>
      <button class="btn ghost" onclick="teardown('reset')">Reset</button>
      <button class="btn ghost" onclick="teardown('wipe')">Wipe all</button>
    </div>
    <div class="mu" style="font-size:12px;margin-top:7px;line-height:1.7">
      <b>Stop</b>: keep everything, restart is instant.<br>
      <b>Reset</b>: clear data (governance, memory, creds), keep the model.<br>
      <b>Wipe all</b>: delete everything, including the downloaded model.</div>
    <p class="sub" style="margin-top:14px">Agent Control policy UI (advanced): <a class="ac" href="http://127.0.0.1:${esc(st.ac_port)}" target="_blank" rel="noopener">127.0.0.1:${esc(st.ac_port)}</a></p>`;
}
function statsRow(st){const g=st.gov;
  return `<div>
    <div class="stat"><b>${g.decisions??'·'}</b><span>decisions logged</span></div>
    <div class="stat"><b>${g.blocked??'·'}</b><span>blocked</span></div>
    <div class="stat"><b>${(st.controls||[]).length||'·'}</b><span>active controls</span></div>
    <div class="stat"><b style="font-size:15px;font-weight:600">${esc(st.llm.model||'·')}</b><span>model</span></div>
  </div>`;
}
function quickStart(st){
  const s=st.setup||{}; const gpu=s.gpu;
  const opts=(s.recommended||[]).map(m=>{const def=(gpu?m.id==='qwen2.5:7b':m.id==='qwen2.5:1.5b');
    const have=(s.downloaded||[]).some(x=>x===m.id||x.startsWith(m.id));
    return `<option value="${m.id}" ${def?'selected':''}>${m.id} &middot; ${m.note}${have?' (downloaded)':''}</option>`;}).join('');
  return `<div class="card" style="border-color:var(--ac)">
    <h2 style="margin-top:0">Quick start</h2>
    <p class="sub" style="margin-bottom:12px">No setup needed. This runs a model on your machine ${gpu?'<b style="color:var(--g)">with your GPU</b>':'<b>on the CPU</b>'} and starts the governed agent.${gpu?'':' No GPU detected, so a small, fast model is picked for you.'}</p>
    <label style="font-size:13px;color:var(--hd)">Model</label>
    <select id="qsmodel" style="margin:5px 0 12px">${opts}</select>
    <div class="foot" style="margin:0">
      <button class="btn" onclick="quickstart()">Download model &amp; start</button>
      ${s.configured&&!s.local?`<button class="btn ghost" onclick="lifecycle('up','Starting with your configured LLM…')">Start with my LLM (${esc(st.llm.model||'external')})</button>`:''}
    </div>
    <p class="cx-help" style="margin-top:8px">First run downloads the model and compiles the agent (a few minutes). Both are kept afterwards.</p></div>`;
}
async function quickstart(){const m=$('#qsmodel').value;
  await api('/api/quickstart',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({model:m})});
  applyOverlay('Downloading '+m+' + building the agent (first time is slow)…');}
async function lifecycle(which,title){await api('/api/'+which,{method:'POST',headers:{'content-type':'application/json'},body:'{}'});applyOverlay(title);}
async function teardown(mode){
  const msg={stop:'Stop the stack? Everything is kept, restart is instant.',
    reset:'Reset? Clears governance data, agent memory and credentials. The downloaded model is kept.',
    wipe:'Wipe everything, including the downloaded model? This cannot be undone.'}[mode];
  if(!confirm(msg))return;
  SETUP.ready=false; SETUP.hello=false; SETUP.build={phase:'idle',lines:[],n:0,err:''}; SETUP.skip={};
  await api('/api/down',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({mode})});
  applyOverlay({stop:'Stopping…',reset:'Resetting (clearing state, keeping the model)…',wipe:'Wiping everything…'}[mode]);
}

/* ---------- Get started (guided setup, ADHD-friendly) ---------- */
function setupStatus(st){
  const a=st.access;
  return {
    start: (SETUP.ready || (st.ready && SETUP.build.phase==='idle')) ? 'done' : 'todo',
    hello: SETUP.hello?'done':(SETUP.skip.hello?'skip':'todo'),
    rules: SETUP.rules?'done':(SETUP.skip.rules?'skip':'todo'),
    channels: (a.telegram.on||a.discord.on||a.slack.on)?'done':(SETUP.skip.channels?'skip':'todo'),
    monitoring: (a.galileo.on||a.o11y.on||a.splunk.on)?'done':(SETUP.skip.monitoring?'skip':'todo'),
  };
}
function setupView(st){
  if(st.building && SETUP.build.phase==='idle'){SETUP.build.phase='building';setupPoll();}  // resume after a page reload
  const S2=setupStatus(st);
  const order=['start','hello','rules','channels','monitoring'];
  const labels={start:'Start',hello:'Hello',rules:'Rules',channels:'Channels',monitoring:'Monitoring'};
  const cur=order.find(k=>S2[k]==='todo')||null;
  const rail=order.map(k=>`<div class="st ${S2[k]==='done'?'done':S2[k]==='skip'?'skip':k===cur?'cur':''}"><div class="d"></div><b>${labels[k]}</b></div>`).join('');
  const coreDone=S2.start==='done'&&S2.hello==='done';
  const allDone=order.every(k=>S2[k]==='done'||S2[k]==='skip');
  let card='';
  if(allDone) card=`<div class="card" style="border-color:var(--g)"><b>You're set up.</b>
    <div class="mu" style="font-size:13px;margin:6px 0 10px">One governed agent, running on your hardware. Home shows its health. Governance holds the leash.</div>
    <div class="foot" style="margin:0"><button class="btn" onclick="go('chat')">Open chat</button></div></div>`;
  else if(cur==='start') card=startStep(st);
  else if(cur==='hello') card=helloStep(st);
  else if(cur==='rules') card=stepCard('Step 3 · Look at your rules','Governance is already on. Default rules block dangerous tool calls, fail-closed. Change nothing unless you want to.',
    `<button class="btn" onclick="SETUP.rules=true;go('governance')">See my rules</button><button class="btn ghost" onclick="SETUP.skip.rules=true;render()">Fine as-is</button>`);
  else if(cur==='channels') card=stepCard('Step 4 · Connect a chat channel','Talk to your agent from your phone or team chat. Optional.',
    `<button class="btn" onclick="go('access')">Set one up</button><button class="btn ghost" onclick="SETUP.skip.channels=true;render()">Not now</button>`);
  else if(cur==='monitoring') card=stepCard('Step 5 · Turn on monitoring','See every decision the governor makes. Optional, works without it.',
    `<button class="btn" onclick="go('access')">Turn it on</button><button class="btn ghost" onclick="SETUP.skip.monitoring=true;render()">Maybe later</button>`);
  return `<h1>Get started</h1><p class="sub">Two required steps, three optional. Skip anything.</p>
    <div class="rail">${rail}</div>
    ${coreDone&&!allDone?`<div class="card" style="border-color:var(--g)"><b>You can stop here.</b>
      <div class="mu" style="font-size:13px;margin-top:4px">Agent running, governance on, data stays on this machine. The rest is optional.</div></div>`:''}
    ${card}`;
}
function stepCard(title,body,foot){
  return `<div class="card" style="border-color:var(--ac)"><b>${title}</b>
    <div class="mu" style="font-size:13px;margin:6px 0 12px">${body}</div>
    <div class="foot" style="margin:0">${foot}</div></div>`;
}
function startStep(st){
  const b=SETUP.build.phase;
  if(b==='building'||b==='checking') return buildingCard();
  if(b==='ready') return `<div class="card" style="border-color:var(--g)"><b>Your agent is running.</b>
    <div class="mu" style="font-size:13px;margin-top:4px">Model loaded, governor watching.</div></div>`;
  if(b==='error') return `<div class="card" style="border-color:var(--rd)"><b>That did not work, and it is not your fault.</b>
    <div class="mu" style="font-size:13px;margin:6px 0 10px">${esc(SETUP.build.err||'The build stopped.')}</div>
    <div class="foot" style="margin:0"><button class="btn" onclick="setupStart(true)">Retry</button></div></div>`;
  const s=st.setup||{}; const gpu=s.gpu;
  const opts=(s.recommended||[]).map(m=>{const def=(gpu?m.id==='qwen2.5:7b':m.id==='qwen2.5:1.5b');
    return `<option value="${m.id}" ${def?'selected':''}>${m.id} · ${m.note}</option>`;}).join('');
  return `<div class="card" style="border-color:var(--ac)"><b>Step 1 · Start your agent</b>
    <div class="mu" style="font-size:13px;margin:6px 0 10px">Detected: ${gpu?'<b style="color:var(--g)">GPU</b>':'<b>CPU</b>'}. Runs entirely on this machine. No account, no API key.</div>
    <label style="font-size:13px;color:var(--hd)">Model</label>
    <select id="su_model" style="margin:5px 0 12px">${opts}</select>
    <div class="foot" style="margin:0"><button class="btn" onclick="setupStart()">Start agent</button></div></div>`;
}
function buildStages(){
  const L=SETUP.build.lines.join('\n'); let stage=1, pct=null;
  if(/ensuring local model|local model:|pulling/i.test(L)) stage=2;
  if(/waiting for services|>> waiting/i.test(L)) stage=3;
  if(SETUP.build.phase==='checking') stage=4;
  if(stage===2){const m=[...L.matchAll(/(\d{1,3})\s*%/g)];if(m.length)pct=Math.min(100,parseInt(m[m.length-1][1]));}
  return {stage,pct};
}
function buildingCard(){
  const {stage,pct}=buildStages();
  const rows=[['Build images',1],['Download model',2],['Load model and start governor',3],['Final check',4]].map(([label,n])=>{
    const stt=n<stage?'done':n===stage?'cur':'todo';
    const icon=stt==='done'?'<i class="dot up"></i>':stt==='cur'?'<span class="spin"></span>':'<i class="dot down"></i>';
    const right=(n===2&&stt==='cur'&&pct!=null)?`${pct}% of 4.7 GB`:stt==='done'?'done':n===4&&stt==='cur'?'asking the agent':'';
    const bar=(n===2&&stt==='cur'&&pct!=null)?`<div class="pbar"><div style="width:${pct}%"></div></div>`:'';
    return `<div class="svc" style="border-top:0;padding:5px 0">${icon}<span class="nm">${label}</span><span class="st">${right}</span></div>${bar}`;
  }).join('');
  return `<div class="card" style="border-color:var(--ac)"><b>Starting your agent</b>
    <div style="margin:10px 0 2px">${rows}</div>
    <div class="mu" style="font-size:12px;margin-top:8px">Takes a few minutes the first time. Safe to leave this tab, we pick up right here.</div>
    <div class="foot" style="margin-top:10px"><button class="btn" disabled>Starting…</button>
      <button class="btn ghost" onclick="setupStop()">Stop</button></div></div>`;
}
async function setupStart(retry){
  const el=$('#su_model');
  SETUP.model=(el&&el.value)||SETUP.model||((S.state.setup&&S.state.setup.gpu)?'qwen2.5:7b':'qwen2.5:1.5b');
  SETUP.build={phase:'building',lines:[],n:0,err:''}; render();
  await api('/api/quickstart',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({model:SETUP.model})});
  setupPoll();
}
async function setupPoll(){
  if(!['building','checking'].includes(SETUP.build.phase))return;
  const r=await api('/api/build/log?since='+SETUP.build.n);
  SETUP.build.n=r.n; if(r.lines&&r.lines.length)SETUP.build.lines.push(...r.lines);
  if(r.running){ if(S.view==='start')render(); setTimeout(setupPoll,900); return; }
  if(r.ok===false){ SETUP.build.phase='error'; SETUP.build.err=SETUP.build.lines.slice(-2).join(' ').slice(-200)||'The build stopped.'; render(); return; }
  SETUP.build.phase='checking'; if(S.view==='start')render(); setupReady();
}
async function setupReady(){
  const r=await api('/api/ready');
  if(r&&r.ready){ SETUP.build.phase='ready'; if(S.view==='start')render();
    setTimeout(()=>{SETUP.ready=true; SETUP.build.phase='idle'; if(S.view==='start')render();},1800); }
  else setTimeout(setupReady,3000);
}
function setupStop(){
  SETUP.build={phase:'idle',lines:[],n:0,err:''};
  api('/api/down',{method:'POST',headers:{'content-type':'application/json'},body:'{}'}); render();
}
function helloStep(st){
  const rep=SETUP.helloReply;
  return `<div class="card" style="border-color:var(--ac)"><b>Step 2 · Say hello</b>
    <div class="mu" style="font-size:13px;margin:6px 0 10px">Your agent is live and governed. Ask it anything.</div>
    ${rep?`<div class="chatlog" style="height:auto;max-height:30vh;margin-bottom:10px"><div class="msg u"><div class="who">you</div><pre>${esc(SETUP.helloMsg)}</pre></div><div class="msg"><div class="who">agent</div><pre>${esc(rep)}</pre></div></div>`:''}
    <div class="foot" style="margin:0"><input id="su_msg" value="What can you do, and what rules are you under?" style="flex:1" ${SETUP.helloBusy?'disabled':''} onkeydown="if(event.key==='Enter')setupHello()">
      <button class="btn" onclick="setupHello()" ${SETUP.helloBusy?'disabled':''}>${SETUP.helloBusy?'<span class="spin"></span>…':'Send'}</button></div></div>`;
}
async function setupHello(){
  const msg=($('#su_msg').value||'').trim(); if(!msg||SETUP.helloBusy)return;
  SETUP.helloMsg=msg; SETUP.helloBusy=true; render();
  const r=await api('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({message:msg})});
  SETUP.helloReply=r.reply||'(no reply)'; SETUP.hello=true; SETUP.helloBusy=false; render();
}

/* ---------- Connections (redesigned) ---------- */
function accessView(st){
  const a=st.access;const v=(x)=>esc(x||'');
  const REALMS=['','us0','us1','us2','eu0','eu1','au0','jp0'];
  const realmOpts=REALMS.map(r=>`<option value="${r}" ${a.o11y.realm===r?'selected':''}>${r||'region'}</option>`).join('');
  const chip=(on,creds)=>on?`<span class="cx-chip"><i class="dot up"></i>Active</span>`
    :`<span class="cx-chip"><i class="dot down"></i>Off${creds?' &middot; <span class="mu">saved</span>':''}</span>`;
  const txt=(id,label,ph,val,help)=>`<div class="cx-field"><label>${label}</label>
     <input type="text" id="${id}" placeholder="${ph}" value="${v(val)}"><div class="cx-help">${help}</div></div>`;
  const sec=(id,label,ph,val,help)=>`<div class="cx-field"><label>${label}</label>
     <div class="cx-inrow"><input type="password" id="${id}" placeholder="${ph}" value="${v(val)}"><button type="button" class="cx-eye" onclick="cxEye(this)" title="Show">&#128065;</button></div>
     <div class="cx-help">${help}</div></div>`;
  const card=(id,name,what,on,creds,body)=>`<div class="cx-card" id="cx_${id}">
     <div class="cx-head" onclick="if(event.target.tagName!=='INPUT')cxOpen('${id}')">
       <span class="cx-nm">${name}</span><span class="cx-what">${what}</span>
       <span id="cxchip_${id}">${chip(on,creds)}</span>
       <label class="sw" onclick="event.stopPropagation()"><input type="checkbox" id="on_${id}" ${on?'checked':''} onchange="cxToggle('${id}',this.checked)"><span class="tk"></span></label>
     </div>
     <div class="cx-body">${body}</div></div>`;
  return `<h1>Connections</h1><p class="sub">How you reach the agent, and where its activity is logged.</p>
   <div class="cx-sec">Chat channels</div>
   ${card('tg','Telegram','Chat from Telegram',a.telegram.on,a.telegram.token,
     sec('a_tg','Bot token','123456789:AAxxxxxxxxxxxxxxxxxxxxxxxxxxx',a.telegram.token,'In Telegram, message @BotFather, send /newbot, and copy the token it replies with.')
     +txt('a_tgid','Allowed Telegram IDs','123456789, 987654321',a.telegram.id,'Only these accounts can talk to the agent. Message @userinfobot in Telegram to see your ID. Separate several with commas.'))}
   ${card('dc','Discord','Chat from a Discord server',a.discord.on,a.discord.token,
     sec('a_dc','Bot token','MTAx...',a.discord.token,'Create an app at discord.com/developers, open the Bot tab, and copy its token. Then invite the bot to your server.'))}
   ${card('sl','Slack','Chat from Slack',a.slack.on,a.slack.token,
     `<div class="cx-cardnote">All three values come from one place: your app&rsquo;s page at api.slack.com/apps.</div>`
     +sec('a_sl','Bot token','xoxb-...',a.slack.token,'Under OAuth &amp; Permissions, after installing the app to your workspace. Starts with xoxb-.')
     +sec('a_sla','App token','xapp-...',a.slack.app,'Under Basic Information, App-Level Tokens. Create one with the connections:write scope. Starts with xapp-.')
     +sec('a_sls','Signing secret','Paste the signing secret',a.slack.signing,'Under Basic Information, App Credentials. Lets the agent verify messages really came from Slack.'))}
   <div class="cx-sec">Monitoring</div>
   ${card('gl','Galileo','Scores every model call',a.galileo.on,a.galileo.key,
     sec('a_gk','API key','Paste your Galileo API key',a.galileo.key,'In Galileo, open Settings, then API Keys, and create one.')
     +txt('a_gp','Project name','OpenClaw_Governed',a.galileo.project,'The Galileo project where these records appear.'))}
   ${card('o11y','Splunk Observability','Health metrics and traces',a.o11y.on,a.o11y.token,
     `<div class="cx-field"><label>Region</label><select id="a_or">${realmOpts}</select><div class="cx-help">Splunk calls this your realm. Find it in your web address: app.us1.signalfx.com means us1.</div></div>`
     +sec('a_ot','Access token','Paste an ingest token',a.o11y.token,'In Splunk Observability: Settings, then Access Tokens. Use a token with ingest permission.'))}
   ${card('sp','Splunk logs','Ship activity logs to Splunk',a.splunk.on,a.splunk.url||a.splunk.token,
     txt('a_su','Splunk log endpoint','https://your-splunk:8088/services/collector',a.splunk.url,'This is Splunk&rsquo;s HTTP Event Collector (HEC), its door for incoming logs. Ask whoever runs Splunk for this URL.')
     +sec('a_st','Endpoint token','Paste the HEC token',a.splunk.token,'Created in Splunk under Settings, Data Inputs, HTTP Event Collector.'))}
   <div class="foot"><button class="btn" onclick="saveAccess()">Save &amp; apply</button></div>`;
}
function cxToggle(id,on){const el=$('#cx_'+id);if(!el)return;if(on)el.classList.add('open');
  const has=[...el.querySelectorAll('.cx-body input')].some(i=>(i.value||'').trim());
  $('#cxchip_'+id).innerHTML=on?`<span class="cx-chip"><i class="dot up"></i>Active</span>`
    :`<span class="cx-chip"><i class="dot down"></i>Off${has?' &middot; <span class="mu">saved</span>':''}</span>`;}
function cxOpen(id){const el=$('#cx_'+id);if(el)el.classList.toggle('open');}
function cxEye(b){const i=b.previousElementSibling;i.type=i.type==='password'?'text':'password';b.title=i.type==='password'?'Show':'Hide';}
async function saveAccess(){
  const g=(id)=>($('#'+id)?.value||'').trim();const on=(id)=>!!($('#'+id)&&$('#'+id).checked);
  await api('/api/access',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({
    telegram:{on:on('on_tg'),token:g('a_tg'),id:g('a_tgid')},
    discord:{on:on('on_dc'),token:g('a_dc')},
    slack:{on:on('on_sl'),token:g('a_sl'),app:g('a_sla'),signing:g('a_sls')},
    galileo:{on:on('on_gl'),key:g('a_gk'),project:g('a_gp')},
    o11y:{on:on('on_o11y'),realm:g('a_or'),token:g('a_ot')},
    splunk:{on:on('on_sp'),url:g('a_su'),token:g('a_st')}})});
  applyOverlay('Applying your changes (only what changed restarts)…');
}

/* ---------- Governance ---------- */
function governanceView(st){
  const cs=st.controls;
  const rows=cs===null?`<div class="mu" style="padding:8px 0">Agent Control is not reachable. Start the stack from Home.</div>`
    :cs.length===0?`<div class="mu" style="padding:8px 0">No rules yet. Add one below.</div>`
    :cs.map(c=>`<div class="svc"><i class="dot ${c.decision==='deny'?'up':c.decision==='steer'?'warn':'down'}" title="${c.enabled?'active':'disabled'}"></i>
       <span class="nm" style="${c.enabled?'':'opacity:.5'}">${esc(c.name)}</span>
       <span class="tag ${esc(c.decision)}">${esc(c.decision)}</span>
       <span class="st">${c.step==='llm'?'prompt':'tool'}</span>
       <label class="sw" style="transform:scale(.82)" title="${c.enabled?'on':'off'}"><input type="checkbox" ${c.enabled?'checked':''} onchange="toggleControl('${c.id}',this.checked)"><span class="tk"></span></label>
       <button class="btn ghost sm" onclick="deleteControl('${c.id}',${JSON.stringify(esc(c.name))})">Delete</button></div>`).join('');
  const editable = cs!==null;
  return `<h1>Governance</h1>
    <p class="sub">The rules every tool call and model turn is checked against. Fail-closed: if the governor is down, actions are blocked. Edit them right here, no separate login.</p>
    <div class="gov-line"><i class="dot up"></i> Governance is always on. Changes apply immediately.</div>
    <div class="stat"><b>${st.gov.decisions??'·'}</b><span>decisions logged</span></div>
    <div class="stat"><b>${st.gov.blocked??'·'}</b><span>blocked</span></div>
    <h2>Rules</h2>
    <div class="card">${rows}</div>
    ${editable?`<h2>Add a rule</h2>
    <div class="card">
      <div class="cx-field"><label>Name</label><input id="rc_name" placeholder="e.g. block-secrets"></div>
      <div class="row" style="gap:10px">
        <div class="cx-field" style="flex:1"><label>Applies to</label><select id="rc_step"><option value="tool">Tool calls</option><option value="llm">Model prompts</option></select></div>
        <div class="cx-field" style="flex:1"><label>Action</label><select id="rc_dec" onchange="var w=$('#rc_steerwrap');if(w)w.style.display=this.value==='steer'?'block':'none'"><option value="deny">Block</option><option value="steer">Steer</option><option value="observe">Log only</option></select></div>
      </div>
      <div class="cx-field"><label>Match (regular expression)</label><input id="rc_pat" placeholder="(?i)password|secret|api[_-]?key">
        <div class="cx-help">If the tool input or prompt matches this, the action fires. Case-insensitive: start the pattern with (?i).</div></div>
      <div class="cx-field" id="rc_steerwrap" style="display:none"><label>Steer message</label><input id="rc_steer" placeholder="Please rephrase without sensitive data."></div>
      <div class="foot" style="margin-top:2px"><button class="btn" onclick="saveControl()">Add rule</button></div>
    </div>`:''}
    <p class="sub" style="margin-top:10px">Prefer the raw vendor console? It is on the <a class="ac" onclick="go('control')">Agent Control</a> tab.</p>`;
}
async function saveControl(){
  const b={name:($('#rc_name').value||'').trim(),step:$('#rc_step').value,decision:$('#rc_dec').value,
    pattern:($('#rc_pat').value||'').trim(),steer_msg:($('#rc_steer')&&$('#rc_steer').value)||''};
  if(!b.name||!b.pattern){toast('Give it a name and a match pattern');return;}
  const r=await api('/api/controls/save',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(b)});
  if(r.ok){toast('Rule added');loadState();}else toast(r.error||'Could not add the rule');
}
async function toggleControl(id,on){
  await api('/api/controls/toggle',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id,enabled:on})});
  loadState();
}
async function deleteControl(id,name){
  if(!confirm('Delete rule "'+name+'"?'))return;
  await api('/api/controls/delete',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({id})});
  toast('Rule deleted');loadState();
}

/* ---------- Agent Control (embedded console) ---------- */
function controlView(st){
  if(!st.stack.server)
    return `<h1>Agent Control</h1><p class="sub">The full governance console, embedded here. Start the stack from Home first, then this shows the live policy editor.</p>`;
  const url=`http://127.0.0.1:${esc(st.ac_port)}`;
  return `<h1>Agent Control</h1>
    <p class="sub">The full governance console, embedded. Add, edit, or remove policy rules; changes apply live. <a class="ac" href="${url}" target="_blank" rel="noopener">Open in a new tab &#8599;</a></p>
    <iframe class="frame" src="${url}" title="Agent Control"></iframe>
    <p class="cx-help" style="margin-top:8px">Running on a remote box? Tunnel this port too: <span class="mono">ssh -L ${esc(st.ac_port)}:127.0.0.1:${esc(st.ac_port)} &lt;box&gt;</span></p>`;
}

/* ---------- Monitoring (external dashboards) ---------- */
function monitoringView(st){
  const a=st.access; const realm=a.o11y.realm||'';
  const o11yUrl=realm?`https://app.${esc(realm)}.signalfx.com`:'';
  const card=(on,name,url)=>`<div class="card"><div class="svc" style="border-top:0;padding-top:0">
     <i class="dot ${on?'up':'down'}"></i><span class="nm"><b>${name}</b></span>
     ${on&&url?`<a class="btn ghost sm" href="${url}" target="_blank" rel="noopener">Open &#8599;</a>`
       :`<span class="st">${on?'on':'off'}</span>`}</div></div>`;
  return `<h1>Monitoring</h1><p class="sub">External dashboards. Turn them on in Connections.</p>
    ${card(a.galileo.on,'Galileo','https://app.galileo.ai')}
    ${card(a.o11y.on,'Splunk Observability',o11yUrl)}
    ${card(a.splunk.on,'Splunk logs','')}`;
}

/* ---------- Chat ---------- */
function chatView(st){
  const up=st.stack.openclaw;
  const log=CHAT.msgs.map(m=>`<div class="msg ${m.role==='user'?'u':''}"><div class="who">${m.role==='user'?'you':'agent'}</div><pre>${esc(m.text)}</pre></div>`).join('')
    ||'<div class="mu">Say hi to your agent. Every reply is governed.</div>';
  return `<h1>Chat</h1><p class="sub">Talk to the agent (openclaw-agent:main). ${up?'':'<span style="color:var(--am)">The stack is not running. Start it from Home first.</span>'}</p>
    <div class="chatlog" id="chatlog">${log}</div>
    <div class="foot"><input id="chatin" placeholder="type a message…" ${CHAT.busy||!up?'disabled':''} onkeydown="if(event.key==='Enter')sendChat()" style="flex:1">
      <button class="btn" onclick="sendChat()" ${CHAT.busy||!up?'disabled':''}>${CHAT.busy?'<span class=spin></span>…':'Send'}</button></div>`;
}
async function sendChat(){
  const inp=$('#chatin');const msg=(inp.value||'').trim();if(!msg||CHAT.busy)return;
  CHAT.msgs.push({role:'user',text:msg});CHAT.busy=true;render();
  const r=await api('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({message:msg})});
  CHAT.msgs.push({role:'agent',text:r.reply||'(no reply)'});CHAT.busy=false;render();
  const l=$('#chatlog');if(l)l.scrollTop=l.scrollHeight;
}

/* ---------- apply overlay (streamed build log) ---------- */
let _bn=0;
function modal(html){$('#modalroot').innerHTML=`<div class="backdrop" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){$('#modalroot').innerHTML='';}
function applyOverlay(title){_bn=0;
  modal(`<h3>${esc(title)}</h3><pre class="log" id="buildlog">starting…</pre>
   <div class="mbtn"><button class="btn" id="doneBtn" disabled onclick="closeModal();loadState()">Done</button></div>`);
  pollApply();}
async function pollApply(){const r=await api('/api/build/log?since='+_bn);_bn=r.n;
  const lg=$('#buildlog');if(lg){for(const l of r.lines)lg.textContent+=(lg.textContent&&!lg.textContent.endsWith('\n')?'\n':'')+l;lg.scrollTop=lg.scrollHeight;}
  if(r.running)setTimeout(pollApply,700);else{const b=$('#doneBtn');if(b)b.disabled=false;}}

loadState();
setInterval(()=>{if(S.view==='home'||S.view==='governance')loadState();},8000);
</script></body></html>
